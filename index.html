<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXCV Valve Sizing Calculator</title>
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #f4f7f6;
            --accent-color: #e67e22;
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .calculator-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            font-size: 22px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .brand-sub {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: -8px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-weight: bold;
            color: var(--primary-color);
            margin: 15px 0 10px 0;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        select, input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background-color: #fff;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: var(--secondary-color);
            padding: 10px;
            border-radius: 4px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            cursor: pointer;
        }

        input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #002244;
        }

        .results-box {
            margin-top: 25px;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 4px;
            border-left: 5px solid var(--primary-color);
        }

        .result-item {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-item span {
            font-weight: bold;
            color: #000;
        }

        .warning-box {
            color: var(--accent-color);
            font-size: 12px;
            font-style: italic;
            margin-top: 10px;
            display: none;
        }

        input:disabled, select:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>FLUXCV Valve Sizing Calculator</h2>
    <div class="brand-sub">A Technology Brand by MAESTRO ASIA PTE LTD</div>

    <div class="form-group">
        <label for="diameter">Nominal Diameter (mm):</label>
        <select id="diameter" onchange="updateValveDropdowns()">
            <option value='G3/4"'>G3/4"</option>
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="32">32</option>
            <option value="40">40</option>
            <option value="50">50</option>
            <option value="65">65</option>
            <option value="80">80</option>
            <option value="100" selected>100</option>
            <option value="125">125</option>
            <option value="150">150</option>
            <option value="200">200</option>
        </select>
    </div>

    <div class="form-group">
        <label for="kvs">Rated Flow Coefficient (Kvs):</label>
        <select id="kvs">
            <option value="120">120</option>
        </select>
    </div>

    <div class="form-group">
        <label for="characteristic">Flow Characteristic:</label>
        <select id="characteristic">
            <option value="Straight line">Straight line</option>
            <option value="Equal percentage" selected>Equal percentage</option>
        </select>
    </div>

    <div class="section-title">Target Calculation optimization</div>
    <div class="radio-group">
        <label class="radio-option">
            <input type="radio" name="calcMode" value="Flow" checked onchange="toggleInputStates()"> Flow Rate
        </label>
        <label class="radio-option">
            <input type="radio" name="calcMode" value="Opening" onchange="toggleInputStates()"> Actuator Opening %
        </label>
        <label class="radio-option">
            <input type="radio" name="calcMode" value="Pressure" onchange="toggleInputStates()"> Pressure Drop
        </label>
    </div>

    <div class="form-group">
        <label for="sg">Fluid Specific Gravity (SG):</label>
        <input type="number" id="sg" value="1.0" step="0.01" min="0.01">
    </div>

    <div class="form-group">
        <label for="flow">Flow Rate (m³/h):</label>
        <input type="number" id="flow" step="0.1" min="0">
    </div>

    <div class="form-group">
        <label for="dp">Pressure Drop ΔP (bar):</label>
        <input type="number" id="dp" step="0.01" min="0">
    </div>

    <div class="form-group">
        <label for="opening">Actuator Opening (%):</label>
        <input type="number" id="opening" step="1" min="0" max="100">
    </div>

    <button type="button" onclick="performCalculation()">Calculate Valve Metrics</button>

    <div class="results-box">
        <div class="section-title" style="margin-top: 0;">Output Results Summary</div>
        <div class="result-item">Calculated Flow Rate: <span id="resFlow">--</span></div>
        <div class="result-item">Calculated Pressure Drop: <span id="resDp">--</span></div>
        <div class="result-item">Calculated Actuator Opening: <span id="resOpen">--</span></div>
        <div class="result-item">Physical Actuator Stem Travel: <span id="resStroke">--</span></div>
        <div id="warningMsg" class="warning-box"></div>
    </div>
</div>

<script>
    const VALVE_DATABASE = {
        'G3/4"':  { kvs: [0.08, 0.12, 0.2, 0.32, 0.5, 0.8], stroke: 10, char: ["Straight line"] },
        "20":     { kvs: [1.2, 2.0, 3.2, 5.0],           stroke: 10, char: ["Straight line", "Equal percentage"] },
        "25":     { kvs: [8.0],                           stroke: 10, char: ["Straight line", "Equal percentage"] },
        "32":     { kvs: [12.0],                          stroke: 16, char: ["Straight line", "Equal percentage"] },
        "40":     { kvs: [20.0],                          stroke: 16, char: ["Straight line", "Equal percentage"] },
        "50":     { kvs: [32.0],                          stroke: 25, char: ["Straight line", "Equal percentage"] },
        "65":     { kvs: [50.0],                          stroke: 25, char: ["Straight line", "Equal percentage"] },
        "80":     { kvs: [80.0],                          stroke: 25, char: ["Straight line", "Equal percentage"] },
        "100":    { kvs: [120.0],                         stroke: 40, char: ["Straight line", "Equal percentage"] },
        "125":    { kvs: [200.0],                         stroke: 40, char: ["Straight line", "Equal percentage"] },
        "150":    { kvs: [280.0],                         stroke: 40, char: ["Straight line", "Equal percentage"] },
        "200":    { kvs: [450.0],                         stroke: 60, char: ["Straight line", "Equal percentage"] }
    };

    const TURNDOWN_RATIO = 30.0;

    function updateValveDropdowns() {
        const dia = document.getElementById('diameter').value;
        const data = VALVE_DATABASE[dia];
        
        const kvsSelect = document.getElementById('kvs');
        kvsSelect.innerHTML = '';
        data.kvs.forEach(val => {
            let opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            kvsSelect.appendChild(opt);
        });
        kvsSelect.value = data.kvs[data.kvs.length - 1];

        const charSelect = document.getElementById('characteristic');
        charSelect.innerHTML = '';
        data.char.forEach(val => {
            let opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            charSelect.appendChild(opt);
        });

        toggleInputStates();
    }

    function toggleInputStates() {
        const mode = document.querySelector('input[name="calcMode"]:checked').value;
        
        document.getElementById('flow').disabled = false;
        document.getElementById('dp').disabled = false;
        document.getElementById('opening').disabled = false;

        if (mode === "Flow") {
            document.getElementById('flow').disabled = true;
            document.getElementById('flow').value = '';
        } else if (mode === "Opening") {
            document.getElementById('opening').disabled = true;
            document.getElementById('opening').value = '';
        } else if (mode === "Pressure") {
            document.getElementById('dp').disabled = true;
            document.getElementById('dp').value = '';
        }
    }

    function performCalculation() {
        const warningBox = document.getElementById('warningMsg');
        warningBox.style.display = 'none';
        warningBox.textContent = '';

        const sg = parseFloat(document.getElementById('sg').value);
        const kvs = parseFloat(document.getElementById('kvs').value);
        const charType = document.getElementById('characteristic').value;
        const dia = document.getElementById('diameter').value;
        const maxStroke = VALVE_DATABASE[dia].stroke;
        const mode = document.querySelector('input[name="calcMode"]:checked').value;

        if (isNaN(sg) || sg <= 0) {
            alert("Specific Gravity must be a positive value.");
            return;
        }

        if (mode === "Flow") {
            const dp = parseFloat(document.getElementById('dp').value);
            const opening = parseFloat(document.getElementById('opening').value);

            if (isNaN(dp) || dp < 0 || isNaN(opening) || opening < 0 || opening > 100) {
                alert("Please provide valid inputs for dP (>=0) and Opening (0-100%).");
                return;
            }

            let x = opening / 100.0;
            let kv = charType === "Straight line" ? kvs * x : (x > 0 ? kvs * Math.pow(TURNDOWN_RATIO, (x - 1.0)) : 0);
            let flow = kv * Math.sqrt(dp / sg);

            displayResults(flow, dp, opening, x * maxStroke);

        } else if (mode === "Opening") {
            const flow = parseFloat(document.getElementById('flow').value);
            const dp = parseFloat(document.getElementById('dp').value);

            if (isNaN(flow) || flow <= 0 || isNaN(dp) || dp <= 0) {
                alert("Flow Rate and Pressure drop must be greater than zero.");
                return;
            }

            let requiredKv = flow / Math.sqrt(dp / sg);

            if (requiredKv > kvs) {
                displayResults("OVERSIZED REQUIRED", dp, "OVERSIZED REQUIRED", "OVERSIZED REQUIRED");
                warningBox.textContent = `⚠️ ALERT: Required Kv (${requiredKv.toFixed(2)}) exceeds this valve's capacity (Max Kvs ${kvs}). Select a larger Nominal Diameter.`;
                warningBox.style.display = 'block';
                return;
            }

            let x = charType === "Straight line" ? requiredKv / kvs : (requiredKv <= 0 ? 0 : 1.0 + (Math.log(requiredKv / kvs) / Math.log(TURNDOWN_RATIO)));
            let opening = Math.max(0.0, Math.min(100.0, x * 100.0));
